name: Build Windows

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        build_type: [Release, Debug]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Visual Studio
        uses: microsoft/setup-msbuild@v1.1

      - name: Install LLVM and Ninja
        shell: pwsh
        run: |
          choco install llvm ninja --yes
          "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Create build directory
        run: mkdir build

      - name: Configure CMake
        run: cmake -B build -G "Ninja Multi-Config" -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel ${{ env.NUMBER_OF_PROCESSORS }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spreadsheet-analyzer-windows-${{ matrix.build_type }}
          path: build/${{ matrix.build_type }}/spreadsheet_analyzer.exe
          if-no-files-found: error
